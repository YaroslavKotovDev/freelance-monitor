<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freelance Monitor — AI-моніторинг фріланс-вакансій</title>

  <!-- SEO -->
  <meta name="description" content="AI-powered моніторинг фріланс-вакансій. Парсить Freelancer.com і Reddit, скорить через GPT і надсилає релевантні гіги у Telegram кожні 30 хвилин." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Freelance Monitor" />
  <meta property="og:description" content="AI-моніторинг фріланс-вакансій у Telegram" />
  <meta property="og:locale" content="uk_UA" />

  <!-- Favicon — SVG inline via data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f0f'/><text y='.9em' font-size='72' x='50%25' text-anchor='middle' dominant-baseline='hanging'>🤖</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f0f'/><text y='.9em' font-size='72' x='50%25' text-anchor='middle' dominant-baseline='hanging'>🤖</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status {
      font-size: 13px;
      color: #22c55e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }
    p {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }
    .feature {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .feature span:first-child { font-size: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="status"><span class="dot"></span>Працює</div>
    <h1>Freelance Monitor</h1>
    <p>AI-моніторинг фріланс-вакансій.<br>Знаходить релевантні гіги та надсилає у Telegram.</p>
    <div class="features">
      <div class="feature"><span>📡</span> RSS-парсинг Freelancer.com і Reddit</div>
      <div class="feature"><span>🤖</span> AI-оцінка кожної вакансії</div>
      <div class="feature"><span>📬</span> Сповіщення у Telegram кожні 30 хв</div>
      <div class="feature"><span>🔗</span> Webhook: <code style="color:#555">/api/webhook</code></div>
    </div>
  </div>
</body>
</html>
